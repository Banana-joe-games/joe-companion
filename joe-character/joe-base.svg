<?xml version="1.0" encoding="UTF-8"?>
<svg width="280" height="280" viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
  <!--
    JOE CHARACTER — Base (neutral expression)
    Compatible with Adobe Illustrator + Figma.

    IMPORTANT IDs (used by JavaScript, don't rename):
    - left-eye, left-pupil, left-glint
    - right-eye, right-pupil, right-glint
    - left-brow, right-brow
    - mouth
  -->

  <defs>
    <radialGradient id="bodyGrad" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1" />
    </radialGradient>
  </defs>

  <!-- BODY -->
  <circle cx="35" cy="38" r="26" fill="#FFD700" />
  <circle cx="35" cy="38" r="26" fill="url(#bodyGrad)" />

  <!-- SHINE HIGHLIGHT -->
  <ellipse cx="28" cy="28" rx="10" ry="8" fill="#ffffff" fill-opacity="0.18" />

  <!-- LEFT EYE -->
  <g id="left-eye">
    <circle cx="25" cy="35" r="6" fill="#ffffff" />
    <circle id="left-pupil" cx="25" cy="35" r="3.5" fill="#1a1a1a" />
    <circle id="left-glint" cx="23.5" cy="33.5" r="1.2" fill="#ffffff" />
  </g>

  <!-- RIGHT EYE -->
  <g id="right-eye">
    <circle cx="45" cy="35" r="6" fill="#ffffff" />
    <circle id="right-pupil" cx="45" cy="35" r="3.5" fill="#1a1a1a" />
    <circle id="right-glint" cx="43.5" cy="33.5" r="1.2" fill="#ffffff" />
  </g>

  <!-- EYEBROWS (hidden by default) -->
  <path id="left-brow" d="M19 28 Q22 26 28 28" stroke="#CC9900" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0" />
  <path id="right-brow" d="M42 28 Q45 26 48 28" stroke="#CC9900" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0" />

  <!-- MOUTH (neutral = smile) -->
  <path id="mouth" d="M28 46 Q35 53 42 46" stroke="#CC9900" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- ANTENNA -->
  <line x1="35" y1="12" x2="35" y2="18" stroke="#CCB000" stroke-width="2" stroke-linecap="round" />
  <circle cx="35" cy="10" r="3" fill="#8B6914" />
</svg>
