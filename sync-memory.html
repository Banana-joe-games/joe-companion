<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #e0e0e0;
      user-select: none;
      overflow: hidden;
    }
    .dialog {
      width: 100%; height: 100%;
      background: rgba(30, 30, 30, 0.92);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      padding: 24px 26px 20px;
    }
    h1 {
      font-size: 16px; font-weight: 600;
      margin-bottom: 4px; color: #fff;
      letter-spacing: -0.2px;
    }
    .subtitle {
      font-size: 11px; color: #666;
      margin-bottom: 14px; line-height: 1.5;
    }
    .subtitle b { color: #999; font-weight: 500; }
    .steps {
      font-size: 10px; color: #555;
      margin-bottom: 12px; line-height: 1.7;
    }
    textarea {
      flex: 1;
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ccc;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-family: "SF Mono", "Menlo", monospace;
      outline: none;
      resize: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    textarea:focus { border-color: rgba(255,215,0,0.4); }
    textarea::placeholder { color: #444; }
    .btn-row { display: flex; gap: 10px; }
    button {
      flex: 1; padding: 9px; border-radius: 8px;
      font-size: 12px; font-family: inherit; font-weight: 500;
      cursor: pointer; transition: all 0.15s; border: none;
    }
    .btn-primary { background: #FFD700; color: #1a1a1a; }
    .btn-primary:hover { background: #ffe033; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #aaa; }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; }
    #status {
      font-size: 10px; color: #666; text-align: center;
      margin-top: 8px; min-height: 14px;
    }
  </style>
</head>
<body>
  <div class="dialog">
    <h1>sync claude.ai memory</h1>
    <p class="subtitle">paste your Claude.ai memory below and Joe will absorb what's relevant.</p>
    <p class="steps">
      how to get it: <b>claude.ai</b> → <b>Settings</b> → <b>Memory</b> → select all → copy
    </p>
    <textarea id="memory-input" placeholder="paste your Claude.ai memory here..."></textarea>
    <div class="btn-row">
      <button class="btn-secondary" id="cancel-btn">cancel</button>
      <button class="btn-primary" id="sync-btn" disabled>sync</button>
    </div>
    <div id="status"></div>
  </div>
  <script>
    const { ipcRenderer } = require("electron");

    var input = document.getElementById("memory-input");
    var syncBtn = document.getElementById("sync-btn");
    var status = document.getElementById("status");

    input.addEventListener("input", function() {
      syncBtn.disabled = !input.value.trim();
    });

    input.addEventListener("keydown", function(e) {
      if (e.key === "Escape") window.close();
    });

    document.getElementById("cancel-btn").addEventListener("click", function() {
      window.close();
    });

    syncBtn.addEventListener("click", function() {
      var text = input.value.trim();
      if (!text) return;

      syncBtn.disabled = true;
      syncBtn.textContent = "syncing...";
      status.textContent = "sending to joe...";

      ipcRenderer.send("sync-memory-submit", text);
    });

    ipcRenderer.on("sync-memory-done", function(event, result) {
      if (result.error) {
        status.textContent = "something went wrong. check the log.";
        syncBtn.disabled = false;
        syncBtn.textContent = "sync";
        return;
      }
      status.textContent = "done.";
      setTimeout(function() { window.close(); }, 800);
    });
  </script>
</body>
</html>
