<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #e0e0e0;
      user-select: none;
      overflow: hidden;
    }
    .dialog {
      width: 100%; height: 100%;
      background: rgba(30, 30, 30, 0.92);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 32px 24px;
    }
    .joe-icon {
      width: 56px; height: 56px;
      background: #FFD700;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(255,215,0,0.3);
    }
    .joe-icon svg { width: 32px; height: 32px; }
    h1 {
      font-size: 17px; font-weight: 600;
      margin-bottom: 4px; color: #fff;
      letter-spacing: -0.2px;
    }
    .subtitle {
      font-size: 12px; color: #888;
      margin-bottom: 20px; text-align: center;
      line-height: 1.5;
    }
    .field {
      width: 100%; margin-bottom: 16px;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #FFD700; }
    .field input::placeholder { color: #555; }
    .btn-row {
      display: flex; gap: 10px; width: 100%;
    }
    button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }
    .btn-primary {
      background: #FFD700;
      color: #1a1a1a;
    }
    .btn-primary:hover { background: #ffe033; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="dialog">
    <div class="joe-icon">
      <svg viewBox="0 0 32 32">
        <circle cx="16" cy="18" r="13" fill="#FFD700" />
        <circle cx="12" cy="16" r="3" fill="#fff" />
        <circle cx="12" cy="16" r="1.8" fill="#1a1a1a" />
        <circle cx="20" cy="16" r="3" fill="#fff" />
        <circle cx="20" cy="16" r="1.8" fill="#1a1a1a" />
        <path d="M12 22 Q16 26 20 22" stroke="#CC9900" stroke-width="1.5" fill="none" stroke-linecap="round" />
      </svg>
    </div>

    <h1>hey, I'm Joe</h1>
    <p class="subtitle">your desktop companion. kinda nosy,<br>but in a helpful way. what's your name?</p>
    <div class="field">
      <input type="text" id="name-input" placeholder="your name" maxlength="15" autofocus />
    </div>
    <div class="btn-row">
      <button class="btn-primary" id="name-go" disabled>let's go</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require("electron");

    var nameInput = document.getElementById("name-input");
    var nameGo = document.getElementById("name-go");

    nameInput.addEventListener("input", function() {
      nameGo.disabled = !nameInput.value.trim();
    });

    nameInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && nameInput.value.trim()) done();
    });

    nameGo.addEventListener("click", done);

    function done() {
      ipcRenderer.send("onboarding-done", { name: nameInput.value.trim() });
    }
  </script>
</body>
</html>
