name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD="$(openssl rand -base64 12)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Build without signing
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --dir

      - name: Sign app
        run: |
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | head -1 | awk -F'"' '{print $2}')
          echo "Signing with: $IDENTITY"
          codesign --deep --force --options runtime --sign "$IDENTITY" --entitlements entitlements.mac.plist "dist/mac-arm64/Clippy Claude.app"
          codesign --verify --deep --strict "dist/mac-arm64/Clippy Claude.app"
          echo "Signing complete!"

      - name: Create DMG
        run: |
          npx create-dmg "dist/mac-arm64/Clippy Claude.app" dist/ || true
          DMG=$(ls dist/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            mv "$DMG" "dist/Clippy-Claude-${{ github.ref_name }}.dmg"
          else
            hdiutil create -volname "Clippy Claude" -srcfolder "dist/mac-arm64/Clippy Claude.app" -ov -format UDZO "dist/Clippy-Claude-${{ github.ref_name }}.dmg"
          fi

      - name: Create ZIP for auto-update
        run: |
          cd dist/mac-arm64
          ditto -c -k --keepParent "Clippy Claude.app" "../Clippy-Claude-${{ github.ref_name }}-mac.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Joe ${{ github.ref_name }}" \
            --generate-notes \
            dist/Clippy-Claude-${{ github.ref_name }}.dmg \
            dist/Clippy-Claude-${{ github.ref_name }}-mac.zip
