<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      color: #e0e0e0;
      user-select: none;
      overflow: hidden;
    }
    .dialog {
      width: 100%; height: 100%;
      background: rgba(30, 30, 30, 0.92);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 32px 24px;
    }
    h1 {
      font-size: 17px; font-weight: 600;
      margin-bottom: 6px; color: #fff;
      letter-spacing: -0.2px;
    }
    .subtitle {
      font-size: 12px; color: #888;
      margin-bottom: 18px;
    }
    .field {
      width: 100%; margin-bottom: 16px;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #FFD700; }
    .field input::placeholder { color: #555; }
    .btn-row { display: flex; gap: 10px; width: 100%; }
    button {
      flex: 1; padding: 10px; border-radius: 8px;
      font-size: 13px; font-family: inherit; font-weight: 500;
      cursor: pointer; transition: all 0.15s; border: none;
    }
    .btn-primary { background: #FFD700; color: #1a1a1a; }
    .btn-primary:hover { background: #ffe033; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #aaa; }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; }
  </style>
</head>
<body>
  <div class="dialog">
    <h1>change name</h1>
    <p class="subtitle">what should I call you?</p>
    <div class="field">
      <input type="text" id="name-input" placeholder="your name" maxlength="15" autofocus />
    </div>
    <div class="btn-row">
      <button class="btn-secondary" id="cancel-btn">cancel</button>
      <button class="btn-primary" id="save-btn" disabled>save</button>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require("electron");
    var input = document.getElementById("name-input");
    var saveBtn = document.getElementById("save-btn");

    input.addEventListener("input", function() {
      saveBtn.disabled = !input.value.trim();
    });
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && input.value.trim()) save();
      if (e.key === "Escape") window.close();
    });
    saveBtn.addEventListener("click", save);
    document.getElementById("cancel-btn").addEventListener("click", function() { window.close(); });

    function save() {
      ipcRenderer.send("change-name-done", { name: input.value.trim() });
    }
  </script>
</body>
</html>
